# Stack NOTIFIER — envía Web Push (VAPID) a los dispositivos suscritos.
# Escucha eventos NOTIFY 'gamificacion' y hace un barrido periódico para
# el digest de repasos vencidos. Sin dependencias de red salvo Postgres.

services:

  notifier:
    build:
      context: ../..
      dockerfile: notifier/Dockerfile
    depends_on: []
    environment:
      DATABASE_URL: postgres://aprentix@db:5432/aprentix
      PGPASSWORD:                ${DB_PASS:?DB_PASS requerida}
      VAPID_PUBLIC_KEY_B64URL:   ${VAPID_PUBLIC_KEY_B64URL:?VAPID_PUBLIC_KEY_B64URL requerida}
      VAPID_PRIVATE_KEY_PEM:     ${VAPID_PRIVATE_KEY_PEM:?VAPID_PRIVATE_KEY_PEM requerida}
      VAPID_SUBJECT:             ${VAPID_SUBJECT:-mailto:soporte@aprentix.es}
      NOTIF_DIGEST_UMBRAL:       ${NOTIF_DIGEST_UMBRAL:-5}
      NOTIF_DIGEST_MIN_HORAS:    ${NOTIF_DIGEST_MIN_HORAS:-12}
      NOTIF_QUIET_START:         ${NOTIF_QUIET_START:-9}
      NOTIF_QUIET_END:           ${NOTIF_QUIET_END:-22}
    restart: unless-stopped
    networks: [dokploy-network]

networks:
  dokploy-network:
    external: true
