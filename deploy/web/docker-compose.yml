# Stack WEB — SPA de tests.
#
# Desde la unificación de dominios, la app se sirve desde aprentix.es/tests/
# a través del reverse proxy del contenedor de la landing (Caddy). Este
# contenedor SOLO recibe tráfico interno (por la red dokploy-network) y no
# expone router propio en Traefik.
#
# El host antiguo test.aprentix.es se conserva únicamente como redirect
# 301 permanente a /tests/ para que los usuarios con la PWA vieja o con
# bookmarks acaben en la nueva ubicación sin romper nada.

services:

  web:
    build:
      context: ../..
      dockerfile: web/Dockerfile
    restart: unless-stopped
    networks: [dokploy-network]
    labels:
      - "traefik.enable=true"

      # Router de redirect 301 test.aprentix.es → aprentix.es/tests/
      - "traefik.http.routers.web-legacy.rule=Host(`${DOMINIO_WEB:-test.aprentix.es}`) || Host(`${DOMINIO_WEB_ALT:-www.test.aprentix.es}`)"
      - "traefik.http.routers.web-legacy.entrypoints=websecure"
      - "traefik.http.routers.web-legacy.tls=true"
      - "traefik.http.routers.web-legacy.tls.certresolver=letsencrypt"
      - "traefik.http.routers.web-legacy.middlewares=web-legacy-redirect"
      - "traefik.http.middlewares.web-legacy-redirect.redirectregex.regex=^https?://[^/]+/(.*)"
      - "traefik.http.middlewares.web-legacy-redirect.redirectregex.replacement=https://${DOMINIO_LANDING:-aprentix.es}/tests/$${1}"
      - "traefik.http.middlewares.web-legacy-redirect.redirectregex.permanent=true"

      # Necesario para que traefik atienda el router aunque el service no
      # se use realmente (Traefik exige un service por container).
      - "traefik.http.services.web.loadbalancer.server.port=80"

networks:
  dokploy-network:
    external: true
