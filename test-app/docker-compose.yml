version: "3.8"

services:
  test-web:
    build: .
    environment:
      HISTORICO_2024: ${HISTORICO_2024:-}
      HISTORICO_2022: ${HISTORICO_2022:-}
      PLAZAS_REFERENCIA_SIMULACRO: ${PLAZAS_REFERENCIA_SIMULACRO:-844}
    restart: unless-stopped
    volumes:
      - /mnt/data/bot:/app/bd
    labels:
      - "traefik.enable=true"

      # Middlewares
      - "traefik.http.middlewares.test_app_https.redirectscheme.scheme=https"
      - "traefik.http.middlewares.test_app_https.redirectscheme.permanent=true"

      # Router HTTPS
      - "traefik.http.routers.test_app.rule=Host(`test.aprentix.es`)"
      - "traefik.http.routers.test_app.entrypoints=websecure"
      - "traefik.http.routers.test_app.tls=true"
      - "traefik.http.routers.test_app.service=test_app"

      # Service
      - "traefik.http.services.test_app.loadbalancer.server.port=8080"

      # Router HTTP → redirect
      - "traefik.http.routers.test_app_http.rule=Host(`test.aprentix.es`)"
      - "traefik.http.routers.test_app_http.entrypoints=web"
      - "traefik.http.routers.test_app_http.middlewares=test_app_https"

    networks:
      - dokploy-network

networks:
  dokploy-network:
    external: true
