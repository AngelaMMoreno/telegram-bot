<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Aprentix — Teoría</title>
  <link rel="stylesheet" href="/style.css">
  <link rel="icon" type="image/svg+xml" href="/logo.svg">
  <script>
    (function () {
      var m = document.cookie.match(/(?:^|;\s*)aprentix_theme=(dark|light|auto)/);
      var theme = m ? m[1] : 'auto';
      if (theme === 'auto') {
        theme = matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
      }
      if (theme === 'dark') document.documentElement.setAttribute('data-theme', 'dark');
    })();
  </script>
</head>
<body>
  <header class="hdr">
    <div class="hdr-left">
      <a href="https://aprentix.es" class="hdr-logo" title="Volver al inicio">
        <span class="brand-logo" aria-hidden="true"></span>
        <span class="brand-name">Aprentix</span>
      </a>
      <nav class="hdr-nav" aria-label="Secciones">
        <a href="https://test.aprentix.es" class="nav-tab" data-nav="tests">Tests</a>
        <span class="nav-tab active" data-nav="teoria" aria-current="page">Teoría</span>
      </nav>
    </div>
    <div class="hdr-right">
      <button id="btn-user-menu" class="user-badge" title="Configuración">
        <span class="avatar" id="user-avatar"></span>
        <span id="user-name-lbl"></span>
      </button>
      <button id="btn-config" class="btn btn-ghost" title="Configuración" aria-label="Configuración">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="3"/>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 1 1-4 0v-.09a1.65 1.65 0 0 0-1-1.51 1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 1 1 0-4h.09a1.65 1.65 0 0 0 1.51-1 1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33h.01a1.65 1.65 0 0 0 1-1.51V3a2 2 0 1 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82v.01a1.65 1.65 0 0 0 1.51 1H21a2 2 0 1 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
        </svg>
      </button>
      <button id="btn-logout" class="btn btn-ghost" title="Cerrar sesión">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
          <polyline points="16 17 21 12 16 7"/>
          <line x1="21" y1="12" x2="9" y2="12"/>
        </svg>
        <span>Salir</span>
      </button>
    </div>
  </header>

  <nav id="bc" class="bc" aria-label="Ruta"></nav>

  <div id="admin-bar" class="admin-bar" hidden>
    <label class="btn btn-sec">
      📤 Subir ficheros
      <input id="file-input" type="file" multiple hidden>
    </label>
    <button id="btn-nueva-carpeta" class="btn btn-sec">📁 Nueva carpeta</button>
    <span class="admin-hint">Doble clic sobre un fichero para renombrarlo · botón derecho para más opciones</span>
  </div>

  <main id="grid" class="grid" aria-live="polite"></main>

  <div id="modal-host"></div>

  <!-- Modal de configuración -->
  <div id="modal-config" class="overlay hidden">
    <div class="modal">
      <h3>Configuración</h3>
      <section class="config-section">
        <h4>Apariencia</h4>
        <div class="theme-toggle">
          <label class="theme-option"><input type="radio" name="theme" value="light"><span>☀️ Claro</span></label>
          <label class="theme-option"><input type="radio" name="theme" value="dark"><span>🌙 Oscuro</span></label>
          <label class="theme-option"><input type="radio" name="theme" value="auto"><span>🖥️ Sistema</span></label>
        </div>
      </section>
      <p class="muted small">
        Puedes configurar el <strong>ritmo de repaso</strong> y el <strong>reset</strong> desde la
        <a href="https://aprentix.es" style="color: var(--pri)">página principal</a>
        o desde la <a href="https://test.aprentix.es" style="color: var(--pri)">app de tests</a>.
      </p>
      <div class="modal-actions">
        <button class="btn btn-cancel" id="btn-config-cerrar">Cerrar</button>
      </div>
    </div>
  </div>

  <script src="/app.js"></script>
</body>
</html>
