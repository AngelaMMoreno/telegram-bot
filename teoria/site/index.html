<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <title>Aprentix — Teoría</title>

  <!-- Todo relativo al mount /teoria/ para que la misma imagen del
       contenedor sirva tanto en teoria.aprentix.es como en
       aprentix.es/teoria/ (mismo origen que la landing y tests). -->
  <base href="/teoria/">

  <!-- PWA: parte de la app unificada bajo aprentix.es. -->
  <!-- Un único manifest para toda la app (servido por la landing en
       aprentix.es/manifest.webmanifest). Con ello Chrome trata /tests/,
       /teoria/ y / como la misma PWA instalada. -->
  <link rel="manifest" href="/manifest.webmanifest">
  <meta name="application-name" content="Aprentix">
  <meta name="theme-color" content="#6B8E23" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#101E1A" media="(prefers-color-scheme: dark)">
  <meta name="color-scheme" content="light dark">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Aprentix">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <link rel="apple-touch-icon" href="shared/pwa-icons/apple-touch-icon.png">

  <link rel="stylesheet" href="shared/tokens.css">
  <link rel="stylesheet" href="shared/base.css">
  <link rel="stylesheet" href="shared/header.css">
  <link rel="stylesheet" href="shared/config.css">
  <link rel="stylesheet" href="style.css">
  <link rel="icon" type="image/svg+xml" href="shared/pwa-icons/icon-any.svg">
  <link rel="icon" type="image/png" sizes="192x192" href="shared/pwa-icons/icon-any-192.png">
  <script>
    (function () {
      var m = document.cookie.match(/(?:^|;\s*)aprentix_theme=(dark|light|auto)/);
      var theme = m ? m[1] : 'auto';
      if (theme === 'auto') {
        theme = matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
      }
      if (theme === 'dark') document.documentElement.setAttribute('data-theme', 'dark');
    })();
  </script>
  <!-- Registra el custom element antes de que el parser llegue a él. -->
  <script src="shared/header.js"></script>
  <!-- Markdown: parser + saneador (se inyecta HTML de terceros). -->
  <script src="shared/vendor/marked.min.js"></script>
  <script src="shared/vendor/purify.min.js"></script>
</head>
<body>

<aprentix-header active="teoria"></aprentix-header>

<nav id="bc" class="bc" aria-label="Ruta"></nav>

<div id="admin-bar" class="admin-bar" hidden>
  <label class="btn btn-sec">
    📤 Subir ficheros
    <input id="file-input" type="file" multiple hidden>
  </label>
  <button id="btn-nueva-carpeta" class="btn btn-sec">📁 Nueva carpeta</button>
  <button id="btn-nuevo-md" class="btn btn-sec">📝 Nuevo markdown</button>
  <span class="admin-hint">Doble clic sobre un fichero para renombrarlo · botón derecho para más opciones</span>
</div>

<main id="grid" class="grid" aria-live="polite"></main>

<!-- Visor / editor de markdown -->
<div id="md-view" class="md-view hidden" aria-hidden="true">
  <header class="md-view-header">
    <button class="btn btn-cancel md-back" id="md-back" aria-label="Volver">← Volver</button>
    <span class="md-title" id="md-title"></span>
    <span class="md-flex"></span>
    <span class="md-status" id="md-status" hidden></span>
    <button class="btn btn-sec md-btn" id="md-editar" hidden>✏️ Editar</button>
    <button class="btn btn-sec md-btn" id="md-preview-toggle" hidden>👁️ Vista previa</button>
    <button class="btn btn-pri md-btn" id="md-guardar" hidden>💾 Guardar</button>
    <button class="btn btn-cancel md-btn" id="md-cancelar" hidden>Cancelar</button>
  </header>
  <div class="md-body" id="md-body">
    <textarea class="md-editor" id="md-editor" spellcheck="false" placeholder="# Escribe aquí…"></textarea>
    <article class="md-render" id="md-render"></article>
  </div>
</div>

<div id="modal-host"></div>

<!-- Modal de configuración -->
<div id="modal-config" class="overlay hidden">
  <div class="modal modal-config">
    <div class="modal-config-header">
      <h3>Configuración</h3>
      <button class="modal-close" id="btn-config-cerrar-x" aria-label="Cerrar">✕</button>
    </div>

    <section class="config-group">
      <h4 class="config-group-title">Sistema</h4>
      <div class="config-section">
        <h5>Apariencia</h5>
        <div class="theme-toggle">
          <label class="theme-option"><input type="radio" name="theme" value="light"><span>☀️ Claro</span></label>
          <label class="theme-option"><input type="radio" name="theme" value="dark"><span>🌙 Oscuro</span></label>
          <label class="theme-option"><input type="radio" name="theme" value="auto"><span>🖥️ Sistema</span></label>
        </div>
      </div>
    </section>

    <section class="config-group">
      <h4 class="config-group-title">Tests</h4>
      <div class="config-section">
        <p class="muted small">
          El <strong>ritmo de repaso</strong> y el <strong>reset</strong> se gestionan desde
          la <a href="/tests/" class="link-pri">app de tests</a>.
        </p>
      </div>
    </section>

    <div class="modal-actions">
      <button class="btn btn-cancel" id="btn-config-cerrar">Cerrar</button>
    </div>
  </div>
</div>

<!-- Notificaciones de logros: pila fija arriba, poblada por notificarLogros(). -->
<div id="logros-notif-stack" class="logros-notif-stack" aria-live="polite" aria-atomic="false"></div>

<script src="app.js"></script>
</body>
</html>
