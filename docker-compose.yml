# Compose maestro SOLO para desarrollo local.
#
# En producción (Dokploy) NO se usa: cada carpeta bajo deploy/ es una
# Compose Application independiente que se puede redesplegar por
# separado. Aquí incluimos los composes que interesen para poder
# levantar todo el stack de una tacada.
#
# Modo único (unificado). Un solo contenedor con Caddy + uvicorn
# sirve landing + tests + teoría desde web/. Se despliega desde deploy/app/.
# Es más simple: menos partes móviles y un solo redeploy tras cualquier
# cambio de frontend.
#
# El modo segmentado (un stack por SPA) se retiró junto con las carpetas
# landing/ y teoria/site/ al unificar el frontend bajo web/.
#
# Requiere Docker Compose 2.20 o superior (por `include:`).

include:
  - deploy/core/docker-compose.yml
  - deploy/app/docker-compose.yml
  - deploy/notificador/docker-compose.yml
