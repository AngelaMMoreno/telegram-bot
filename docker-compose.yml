# Compose maestro SOLO para desarrollo local.
#
# En producción (Dokploy) NO se usa: cada carpeta bajo deploy/ es una
# Compose Application independiente para poder redesplegar por partes.
# Aquí incluimos los cuatro composes para que `docker compose up` levante
# todo el stack de una tacada.
#
# Requiere Docker Compose 2.20 o superior (por `include:`).

include:
  - deploy/core/docker-compose.yml
  - deploy/landing/docker-compose.yml
  - deploy/web/docker-compose.yml
  - deploy/teoria/docker-compose.yml
